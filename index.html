<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#4F46E5">
  <title>课程助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700&family=Archivo:wght@400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- ===== Header ===== -->
    <header id="app-header">
      <div class="header-left" id="header-left"></div>
      <h1 class="header-title" id="header-title">今日</h1>
      <div class="header-right" id="header-right"></div>
    </header>

    <!-- ===== Main Content ===== -->
    <main id="main-content">
      <div id="page-today" class="page active"></div>
      <div id="page-calendar" class="page"></div>
      <div id="page-students" class="page"></div>
      <div id="page-income" class="page"></div>
    </main>

    <!-- ===== FAB ===== -->
    <button id="fab" class="fab" aria-label="排课">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    </button>

    <!-- ===== Bottom Navigation ===== -->
    <nav id="bottom-nav">
      <button class="nav-item active" data-tab="today">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span>今日</span>
      </button>
      <button class="nav-item" data-tab="calendar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
          <rect x="7" y="14" width="3" height="3" rx="0.5"></rect>
          <rect x="14" y="14" width="3" height="3" rx="0.5"></rect>
        </svg>
        <span>课表</span>
      </button>
      <button class="nav-item" data-tab="students">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        <span>学生</span>
      </button>
      <button class="nav-item" data-tab="income">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="1" x2="12" y2="23"></line>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
        </svg>
        <span>收入</span>
      </button>
    </nav>

    <!-- ===== Schedule Panel Overlay ===== -->
    <div id="schedule-overlay" class="overlay">
      <div id="schedule-panel" class="bottom-sheet">
        <!-- filled by schedule.js -->
      </div>
    </div>

    <!-- ===== Student Form Overlay ===== -->
    <div id="student-overlay" class="overlay">
      <div id="student-panel" class="bottom-sheet">
        <!-- filled by students.js -->
      </div>
    </div>

    <!-- ===== Toast ===== -->
    <div id="toast" class="toast"></div>

    <!-- ===== Confirm Dialog ===== -->
    <div id="confirm-overlay" class="overlay confirm-overlay">
      <div id="confirm-dialog" class="confirm-dialog">
        <p id="confirm-message"></p>
        <div class="confirm-actions">
          <button id="confirm-cancel" class="btn btn-secondary">取消</button>
          <button id="confirm-ok" class="btn btn-danger">确认</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Scripts (order matters: dependencies first) -->
  <script src="utils.js"></script>
  <script src="charts.js"></script>
  <script src="students.js"></script>
  <script src="schedule.js"></script>
  <script src="calendar.js"></script>
  <script src="income.js"></script>
  <script src="app.js"></script>
</body>
</html>
